{% extends 'partials/base.html' %}

{% block content %}
<section class="container d-flex flex-column mt-5">
    <div class="row align-items-center justify-content-center g-0 h-lg-100 py-5">
        <div class="col-lg-5 col-md-8 py-4">
            <div class="soft-detail-panel p-4 p-lg-5">
                <div class="mb-4">
                    <h1 class="mb-1 fw-bold">Login</h1>
                    <span class="text-secondary">
                        Don’t have an account?
                        <a href="{% url "userauths:register" %}{% if next_url %}?next={{ next_url|urlencode }}{% endif %}" class="ms-1">Register</a>
                    </span>
                </div>
                <form class="needs-validation" method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next_url }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" name="email" value="{{ email|default:'' }}" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="password" required>
                    </div>
                    <div class="d-lg-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberme"/>
                            <label class="form-check-label" for="rememberme">Remember me</label>
                        </div>
                        <div>
                            <a href="{% url "userauths:forgot_password" %}">Forgot your password?</a>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Login <i class="fas fa-sign-in-alt ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
