{% extends 'partials/base.html' %}

{% block content %}
<section class="container d-flex flex-column mt-5">
    <div class="row align-items-center justify-content-center g-0 h-lg-100 py-5">
        <div class="col-lg-5 col-md-8 py-4">
            <div class="soft-detail-panel p-4 p-lg-5">
                <div class="mb-4">
                    <h1 class="mb-1 fw-bold">Register</h1>
                    <span class="text-secondary">
                        Already have an account?
                        <a href="{% url "userauths:login" %}{% if next_url %}?next={{ next_url|urlencode }}{% endif %}" class="ms-1">Login</a>
                    </span>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next_url }}">
                    <div class="mb-3">
                        <label for="full_name" class="form-label">Full Name</label>
                        <input type="text" name="full_name" value="{{ form_data.full_name|default:'' }}" class="form-control" id="full_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" name="email" value="{{ form_data.email|default:'' }}" class="form-control" id="email" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Register <i class="fas fa-user-plus ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
