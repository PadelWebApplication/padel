{% extends "partials/base.html" %}
{% block content %}
<section class="pt-5 pb-5">
    <div class="container">
        <div class="row mt-0 mt-md-4">
            {% include "coach/sidebar.html" %}

            <div class="col-lg-9 col-md-8 col-12">
                <h4 class="mb-0 mb-4 fw-bold">Payments</h4>
                <form class="row" enctype="multipart/form-data" method="POST">
                    {% csrf_token %}
                    <div class="col-lg-12 mb-3">
                        <label class="form-label">Profile Avatar</label>
                        {% if coach.image %}
                        <p class="small text-muted">Current Avatar: {{ coach.image.url }}</p>
                        {% endif %}
                        <input type="file" class="form-control" name="image" />
                    </div>
                    <div class="col-lg-12 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" value="{{ coach.full_name }}" class="form-control" />
                    </div>
                    <div class="col-lg-6 mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" name="email" value="{{ coach.user.email }}" class="form-control bg-light" readonly />
                    </div>
                    <div class="col-lg-6 mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="text" name="mobile" value="{{ coach.mobile }}" class="form-control" />
                    </div>
                    <div class="col-lg-6 mb-3">
                        <label class="form-label">Bio</label>
                        <input type="text" name="bio" value="{{ coach.bio }}" class="form-control" />
                    </div>
                    <div class="col-lg-6 mb-3">
                        <label class="form-label">Country</label>
                        <input type="text" name="country" value="{{ coach.country }}" class="form-control" />
                    </div>
                    <div class="col-lg-6 mb-3">
                        <label class="form-label">Specialization</label>
                        <input type="text" name="specialization" value="{{ coach.specialization }}" class="form-control" />
                    </div>
                    <div class="col-lg-6 mb-3">
                        <label class="form-label">Qualification</label>
                        <input type="text" name="qualification" value="{{ coach.qualification }}" class="form-control" />
                    </div>
                    <div class="col-lg-6 mb-3">
                        <label class="form-label">Years of Experience</label>
                        <input type="text" name="years_of_experience" value="{{ coach.years_of_experience }}" class="form-control" />
                    </div>
                    <div class="col-lg-6 mb-3">
                        <label class="form-label">Next Available Session Date</label>
                        <input type="date" name="next_available_session_date" value="{{ formatted_next_available_session_date }}" class="form-control" />
                    </div>
                    <button type="submit" class="btn btn-success">Save Changes <i class="fas fa-check-circle ms-2"></i></button>
                </form>
            </div>
        </div>
    </div>
</section>

{% endblock content %}
